<h1 id="snippets-1">Snippets</h1>
<p>Voici la liste des <i class='important'>snippets</i> disponibles dans le fichier <code>snippets.json</code></p>
<ul>
<li><strong>emph</strong> et <strong>emphi</strong> : Texte en couleur (bold ou italic)</li>
<li><strong>binfo</strong> : block d'information</li>
<li><strong>bwarn</strong> : block de warning</li>
<li><strong>bstd</strong> : block standard</li>
<li><strong>bdef-title</strong> : block de définition</li>
<li><strong>slide</strong> : nouvelle slide vierge</li>
<li><strong>section</strong> : nouvelle section</li>
<li><strong>cover</strong> : nouvelle page de couverture</li>
<li><strong>table-of-content</strong> : table des matières</li>
<li><strong>table-of-content-auto</strong> : table des matières avec les sections</li>
<li><strong>lay-h2</strong> : 2 colonnes</li>
<li><strong>lay-h2-custom</strong> : 2 colonnes de taille inégales</li>
<li><strong>lay-h3</strong> : 3 colonnes</li>
<li><strong>lay-h4</strong> : 4 colonnes</li>
</ul>

</script>
